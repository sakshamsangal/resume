<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Workspace: Observation-First</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --danger: #dc2626;
            --danger-hover: #b91c1c;
            --border: #e2e8f0;
            --radius: 8px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 24px;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 1.75rem;
            color: var(--text-main);
            font-weight: 700;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .btn {
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-danger {
            background-color: transparent;
            color: var(--danger);
            border: 1px solid var(--border);
        }

        .btn-danger:hover {
            background-color: #fef2f2;
            border-color: #fca5a5;
        }

        .btn-icon {
            padding: 4px;
            background: transparent;
            color: var(--text-muted);
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }

        .btn-icon:hover {
            background-color: var(--bg-color);
            color: var(--danger);
        }

        /* Workspace Grid Split Layout (Swapped Decks orientation natively supported) */
        .workspace-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-title span.step {
            font-size: 0.75rem;
            background: var(--bg-color);
            color: var(--text-muted);
            padding: 2px 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        /* Observations Styling */
        .observation-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .observation-input-group input {
            flex: 1;
            font-family: inherit;
            font-size: 0.95rem;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            outline: none;
        }

        .observation-input-group input:focus {
            border-color: var(--primary);
        }

        .observations-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 650px;
            overflow-y: auto;
        }

        .observation-item {
            display: flex;
            flex-direction: column;
            padding: 12px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            gap: 8px;
        }

        .observation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .observation-text {
            font-size: 0.95rem;
            word-break: break-word;
            flex: 1;
        }

        .observation-item.editing .observation-text {
            display: none;
        }

        .edit-input {
            display: none;
            width: 100%;
            font-family: inherit;
            font-size: 0.95rem;
            padding: 6px 10px;
            border: 1px solid var(--primary);
            border-radius: 4px;
            outline: none;
        }

        .observation-item.editing .edit-input {
            display: block;
        }

        .item-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        /* Rich Text ContentEditable Engine Container */
        .connect-textarea {
            width: 100%;
            min-height: 600px;
            font-family: inherit;
            font-size: 0.95rem;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-main);
            outline: none;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .connect-textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .connect-textarea img {
            max-width: 100%;
            max-height: 220px;
            display: block;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        /* Auto-Suggest Dropdown Box */
        .suggest-dropdown {
            position: absolute;
            background: white;
            border: 1px solid var(--primary);
            border-radius: var(--radius);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-height: 220px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            width: calc(100% - 40px);
            list-style: none;
        }

        .suggest-item {
            padding: 10px 14px;
            font-size: 0.9rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        .suggest-item:last-child {
            border-bottom: none;
        }

        .suggest-item.selected, .suggest-item:hover {
            background-color: #eff6ff;
            color: var(--primary);
        }

        @media (max-width: 900px) {
            .workspace-grid {
                grid-template-columns: 1fr;
            }
            body {
                padding: 16px;
            }
            .connect-textarea {
                min-height: 350px;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div>
            <h1>DSA Workspace</h1>
            <div class="subtitle">Compose algorithmic blueprints and log structural edge cases side-by-side.</div>
        </div>
        <button class="btn btn-danger" id="clear-all-btn">Clear All</button>
    </header>

    <main class="workspace-grid">
        <section class="panel" id="blueprint-panel">
            <h2 class="panel-title">
                Connect the Dots (Approach Blueprint)
                <span class="step">Left Deck</span>
            </h2>
            <div id="solution-approach" class="connect-textarea" contenteditable="true" placeholder="Start writing your step-by-step strategy here... Type '//' to inject a deck element."></div>
            <ul class="suggest-dropdown" id="suggest-menu"></ul>
        </section>

        <section class="panel">
            <h2 class="panel-title">
                Observations & Edge Cases
                <span class="step">Right Deck</span>
            </h2>
            <div class="observation-input-group">
                <input type="text" id="observation-input" placeholder="Type a description followed by an image URL, or normal notes...">
                <button class="btn btn-primary" id="add-observation-btn">Add</button>
            </div>
            <ul class="observations-list" id="observations-list"></ul>
        </section>
    </main>
</div>

<script>
    // Elements
    const solutionInput = document.getElementById('solution-approach');
    const obsInput = document.getElementById('observation-input');
    const obsBtn = document.getElementById('add-observation-btn');
    const obsList = document.getElementById('observations-list');
    const clearBtn = document.getElementById('clear-all-btn');
    const suggestMenu = document.getElementById('suggest-menu');

    let state = {
        observations: [], // Stores objects: { text: string, type: 'text'|'image', url?: string }
        solutionApproach: ''
    };

    let activeSuggestIndex = 0;
    let rangeAtTrigger = null;

    function isImageURL(url) {
        return (url.match(/\.(jpeg|jpg|gif|png|webp|svg)$/i) != null) || url.startsWith('data:image/');
    }

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, 
            tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
        );
    }

    function parseObservationInput(inputStr) {
        const words = inputStr.split(/\s+/);
        let imageUrl = '';
        let descriptionWords = [];

        words.forEach(word => {
            if (isImageURL(word)) {
                imageUrl = word;
            } else {
                descriptionWords.push(word);
            }
        });

        const description = descriptionWords.join(' ').trim();

        if (imageUrl) {
            return {
                text: description || 'Image Asset Reference',
                type: 'image',
                url: imageUrl
            };
        } else {
            return {
                text: inputStr.trim(),
                type: 'text'
            };
        }
    }

    function loadState() {
        const saved = localStorage.getItem('dsa_workspace_swapped_clean_state');
        if (saved) {
            try {
                state = JSON.parse(saved);
                solutionInput.innerHTML = state.solutionApproach || '';
                if(!state.observations) state.observations = [];
                renderObservations();
            } catch (e) {
                console.error("Error reloading saved state:", e);
            }
        } else {
            solutionInput.innerHTML = '';
            renderObservations();
        }
    }

    function saveState() {
        state.solutionApproach = solutionInput.innerHTML;
        localStorage.setItem('dsa_workspace_swapped_clean_state', JSON.stringify(state));
    }

    // Render configuration updated to only display text description context labels
    function renderObservations() {
        obsList.innerHTML = '';
        if (state.observations.length === 0) {
            obsList.innerHTML = `<li style="color: var(--text-muted); font-size: 0.9rem; text-align: center; padding: 24px; list-style:none;">No observations logged. Map constraints, pattern observations, or write a description with an image link here.</li>`;
            return;
        }

        state.observations.forEach((obs, index) => {
            const li = document.createElement('li');
            li.className = 'observation-item';
            
            let rawEditText = obs.text;
            if (obs.type === 'image') {
                rawEditText = `${obs.text} ${obs.url}`;
            }

            li.innerHTML = `
                <div class="observation-header">
                    <span class="observation-text"><strong>#${index + 1}:</strong> ${escapeHTML(obs.text)} ${obs.type === 'image' ? '<small style="color:var(--text-muted)">(🖼️ Attached)</small>' : ''}</span>
                    <input type="text" class="edit-input" value="${escapeHTML(rawEditText)}">
                    <div class="item-actions">
                        <button class="btn-icon edit-btn" onclick="toggleEdit(${index}, this)">✏️</button>
                        <button class="btn-icon delete-btn" onclick="deleteObs(${index})">🗑️</button>
                    </div>
                </div>
            `;
            obsList.appendChild(li);
        });
    }

    function addObservation() {
        const text = obsInput.value.trim();
        if (text) {
            const parsed = parseObservationInput(text);
            state.observations.push(parsed);
            obsInput.value = '';
            saveState();
            renderObservations();
        }
    }

    window.deleteObs = function(index) {
        state.observations.splice(index, 1);
        saveState();
        renderObservations();
    };

    window.toggleEdit = function(index, button) {
        const item = button.closest('.observation-item');
        const input = item.querySelector('.edit-input');
        
        if (item.classList.contains('editing')) {
            const updatedText = input.value.trim();
            if (updatedText) {
                state.observations[index] = parseObservationInput(updatedText);
                saveState();
            }
            item.classList.remove('editing');
            renderObservations();
        } else {
            item.classList.add('editing');
            input.focus();
            button.innerText = '💾';
        }
    };

    function getCaretTextAndRange() {
        const sel = window.getSelection();
        if (sel.rangeCount > 0) {
            const range = sel.getRangeAt(0);
            if (range.startContainer.nodeType === Node.TEXT_NODE) {
                const text = range.startContainer.textContent;
                const offset = range.startOffset;
                return { textBefore: text.substring(0, offset), range: range.cloneRange() };
            }
        }
        return { textBefore: '', range: null };
    }

    function showSuggestions(textBeforeCaret, range) {
        if (state.observations.length === 0) return hideSuggestions();

        const slashIndex = textBeforeCaret.lastIndexOf('//');
        const query = textBeforeCaret.substring(slashIndex + 2).toLowerCase();

        const matches = state.observations.map((obs, idx) => ({ obs, originalIdx: idx }))
            .filter(item => 
                (item.originalIdx + 1).toString().includes(query) || 
                item.obs.text.toLowerCase().includes(query)
            );

        if (matches.length === 0) {
            hideSuggestions();
            return;
        }

        rangeAtTrigger = range;
        suggestMenu.innerHTML = '';
        
        matches.forEach((match, i) => {
            const li = document.createElement('li');
            li.className = `suggest-item ${i === 0 ? 'selected' : ''}`;
            li.innerHTML = `<strong>#${match.originalIdx + 1}:</strong> ${escapeHTML(match.obs.text)} ${match.obs.type === 'image' ? '🖼️' : ''}`;
            li.addEventListener('click', () => injectSelection(match.originalIdx));
            suggestMenu.appendChild(li);
        });

        activeSuggestIndex = 0;
        suggestMenu.style.top = `${solutionInput.offsetTop + 45}px`;
        suggestMenu.style.left = `20px`;
        suggestMenu.style.display = 'block';
    }

    function hideSuggestions() {
        suggestMenu.style.display = 'none';
        rangeAtTrigger = null;
    }

    // Selection injection script logic updated: images drop strictly matching resource nodes, text outputs raw values.
    function injectSelection(originalIdx) {
        if (!rangeAtTrigger) return;
        
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(rangeAtTrigger);

        const node = rangeAtTrigger.startContainer;
        const text = node.textContent;
        const slashIndex = text.lastIndexOf('//');

        rangeAtTrigger.setStart(node, slashIndex);
        rangeAtTrigger.setEnd(node, rangeAtTrigger.endOffset);
        rangeAtTrigger.deleteContents();

        const obs = state.observations[originalIdx];
        const fragment = document.createDocumentFragment();

        if (obs.type === 'image') {
            const imgNode = document.createElement('img');
            imgNode.src = obs.url;
            imgNode.alt = obs.text;
            fragment.appendChild(imgNode);
        } else {
            const textNode = document.createTextNode(obs.text);
            fragment.appendChild(textNode);
        }

        // Shifts pointer to next newline element container space
        const brNode = document.createElement('br');
        const nextLineNode = document.createTextNode('\n');
        fragment.appendChild(brNode);
        fragment.appendChild(nextLineNode);

        rangeAtTrigger.insertNode(fragment);

        const newRange = document.createRange();
        newRange.setStartAfter(nextLineNode);
        newRange.collapse(true);
        sel.removeAllRanges();
        sel.addRange(newRange);

        hideSuggestions();
        saveState();
        solutionInput.focus();
    }

    // Keydown tracking events cleaned completely of forced bullet layout parameters
    solutionInput.addEventListener('keydown', (e) => {
        if (suggestMenu.style.display === 'block') {
            const items = suggestMenu.querySelectorAll('.suggest-item');
            
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                items[activeSuggestIndex].classList.remove('selected');
                activeSuggestIndex = (activeSuggestIndex + 1) % items.length;
                items[activeSuggestIndex].classList.add('selected');
                items[activeSuggestIndex].scrollIntoView({ block: 'nearest' });
                return;
            } 
            else if (e.key === 'ArrowUp') {
                e.preventDefault();
                items[activeSuggestIndex].classList.remove('selected');
                activeSuggestIndex = (activeSuggestIndex - 1 + items.length) % items.length;
                items[activeSuggestIndex].classList.add('selected');
                items[activeSuggestIndex].scrollIntoView({ block: 'nearest' });
                return;
            } 
            else if (e.key === 'Enter' || e.key === 'Tab') {
                e.preventDefault();
                if (items[activeSuggestIndex]) {
                    items[activeSuggestIndex].click();
                }
                return;
            } 
            else if (e.key === 'Escape') {
                e.preventDefault();
                hideSuggestions();
                return;
            }
        }

        if (e.key === 'Enter') {
            e.preventDefault();
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                const br = document.createElement('br');
                const nextLine = document.createTextNode('\n');
                
                range.insertNode(nextLine);
                range.insertNode(br);
                
                range.setStartAfter(nextLine);
                range.collapse(true);
                sel.removeAllRanges();
                sel.addRange(range);
            }
            saveState();
        }
    });

    solutionInput.addEventListener('input', (e) => {
        const { textBefore, range } = getCaretTextAndRange();
        if (textBefore.includes('//')) {
            const lastTrigger = textBefore.lastIndexOf('//');
            const chunk = textBefore.substring(lastTrigger);
            if (!chunk.includes(' ')) {
                showSuggestions(textBefore, range);
                return;
            }
        }
        hideSuggestions();
        saveState();
    });

    document.addEventListener('click', (e) => {
        if (!suggestMenu.contains(e.target) && e.target !== solutionInput) {
            hideSuggestions();
        }
    });

    obsBtn.addEventListener('click', addObservation);
    obsInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addObservation(); });

    clearBtn.addEventListener('click', () => {
        if (confirm('Clear entire session workspace records?')) {
            state = { observations: [], solutionApproach: '' };
            solutionInput.innerHTML = '';
            obsInput.value = '';
            saveState();
            renderObservations();
            hideSuggestions();
        }
    });

    loadState();
</script>
</body>
</html>
